<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloversLife INC</title>
  <!-- Google Font: Montserrat para un look moderno -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
  <style>
    body { background-color: #000000 !important; color: #ffffff !important; margin: 0; padding: 20px; font-family: sans-serif; }
    
    /* Contenedor principal adaptable */
    .jewelry-card { max-width: 400px; margin: 0 auto; }
    
    /* TU NOMBRE ESTILO PREMIUM ORIGINAL */
    .brand-badge { 
        font-family: 'Montserrat', sans-serif;
        font-weight: 800; 
        font-size: 20px; 
        letter-spacing: 4px; 
        margin-bottom: 20px; 
        text-transform: uppercase; 
        text-align: center;
    }
    
    .main-product-img { width: 100%; border-radius: 8px; display: block; margin-bottom: 15px; }
    .jewelry-details h4 { font-size: 22px; margin: 10px 0; font-weight: 700; }
    .collection-tag { font-size: 12px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }
    .price-tag { font-size: 24px; font-weight: bold; margin: 15px 0; }
    .description { font-size: 14px; color: #ccc; line-height: 1.5; margin-bottom: 25px; }
    
    .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 20px; margin-bottom: 50px; margin-top: 30px; }
    .option-card { 
        display: flex; flex-direction: column; align-items: center; border: 1px solid #333; 
        border-radius: 8px; padding: 10px; background: #111; cursor: pointer; 
        transition: all 0.3s ease; overflow: visible; z-index: 1;
    }
    .option-card img { width: 50px; height: 50px; border-radius: 4px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
    .option-card.active { border-color: #ffffff; z-index: 10; }
    .option-card.active img { transform: scale(2.0); box-shadow: 0 10px 25px rgba(0,0,0,0.8); } 
    .option-card span { font-size: 11px; font-weight: 600; text-align: center; margin-bottom: 6px; margin-top: 25px; }
    .select-indicator { font-size: 10px; font-weight: bold; padding: 4px 8px; border: 1px solid #444; border-radius: 4px; color: #888; text-transform: uppercase; margin-top: 5px; }
    .option-card.active .select-indicator { background: #fff; color: #000; border-color: #fff; }

    input, select { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
    .shipment-box { border: 1px solid #333; border-radius: 8px; padding: 15px; background: #111; margin-bottom: 20px; }
    .shipment-option { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    
    .warning-box { background-color: #1a1a1a; border: 1px solid #ff4444; padding: 15px; border-radius: 8px; margin: 20px 0; color: #fff; font-size: 13px; text-align: center; line-height: 1.4; }
    
    /* TU CAJA DE POLÍTICA ORIGINAL */
    .policy-box { font-size: 11px; color: #777; line-height: 1.4; margin: 20px 0; padding: 10px; border-top: 1px solid #222; text-align: center; }
    
    .summary-box { border: 1px dashed #333; padding: 15px; margin-bottom: 20px; background: #050505; color: #fff; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #aaa; }
    .total-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-top: 10px; }
    button { width: 100%; background: #ffffff; color: #000000; border: none; padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 8px; margin-top: 15px; }

    /* SECCIÓN DE CONTACTO ORIGINAL */
    .contact-section { margin-top: 30px; text-align: center; border-top: 1px solid #222; padding-top: 20px; color: #888; font-size: 13px; }
    .contact-line { margin-bottom: 15px; }
    .dm-link, .mail-link { color: #fff; text-decoration: none; font-weight: bold; }

    /* SECCIÓN DE RESEÑAS REALISTAS */
    .reviews-section { border-top: 1px solid #222; padding-top: 25px; margin-top: 40px; }
    .reviews-title { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .reviews-rating-avg { color: #ffcc00; font-size: 14px; }
    .review-card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: left; }
    
    /* Ocultar las reseñas extra al principio */
    .more-reviews { display: none; }
    
    .review-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .reviewer-name { font-size: 13px; font-weight: bold; color: #fff; }
    .review-stars { color: #ffcc00; font-size: 12px; }
    .review-date { font-size: 11px; color: #666; }
    .review-verified { font-size: 10px; color: #00ff66; background: rgba(0,255,102,0.1); padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; display: inline-block; margin-bottom: 8px; }
    .review-body { font-size: 13px; color: #ccc; line-height: 1.4; }
    .review-meta { font-size: 11px; color: #555; margin-top: 8px; font-style: italic; }

    /* Botón View All personalizado */
    .view-all-btn { background: none; border: none; color: #aaa; font-size: 13px; text-decoration: underline; cursor: pointer; padding: 10px; text-transform: none; font-weight: normal; margin-top: 5px; margin-bottom: 20px; width: auto; display: inline-block; }
    .view-all-btn:hover { color: #fff; }

    /* 🖥️ MEDIA QUERY PARA ADAPTACIÓN A COMPUTADORA */
    @media (min-width: 768px) {
      .jewelry-card {
        max-width: 950px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        align-items: start;
        padding: 40px 0;
      }
      .product-gallery-sticky {
        position: sticky;
        top: 20px;
      }
      .product-info-scroll {
        max-height: 90vh;
        overflow-y: auto;
        padding-right: 15px;
      }
      .product-info-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .product-info-scroll::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 4px;
      }
    }
  </style>
</head>
<body>

<div class="jewelry-card">
  
  <!-- COLUMNA IZQUIERDA: Galería e Información del Producto (Fija en PC) -->
  <div class="product-gallery-sticky">
    <div class="brand-badge">CLOVERSLIFE INC</div>
    
    <img src="https://i.ibb.co/zWPr8Q5b/IMG-7586.jpg" class="main-product-img">
    
    <div class="jewelry-details">
      <span class="collection-tag">Exclusive Drop</span>
      <h4>Iced Out Clover Bracelet</h4>
      <div class="description">Solid S925 CZ handset with clarity simulated diamonds. Maximum shine.</div>
      <div class="price-tag">$110.00</div>
    </div>
  </div>

  <!-- COLUMNA DERECHA: Formulario, Compras y Reseñas (Scroll en PC) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // 1. Inicialización Global (asegúrate de usar la KEY correcta)
  // Nota: Asegúrate de usar la 'anon key' (public), no una de servicio.
  const supabase = supabase.createClient('https://jcixophjgzvzrixjowfc.supabase.co', 'sb_publishable_CoZo2p09QGtbOevb6r20HQ_m4Y74D4v');

  function showAllReviews() {
    document.getElementById('extendedReviews').style.display = 'block';
    document.getElementById('viewAllBtn').style.display = 'none';
  }

  function updateTotal() {
    const isExpress = document.querySelector('input[name="shipping"]:checked').value === 'express';
    const bracelet = 110.00;
    const shipping = isExpress ? 10.00 : 0.00;
    const subtotal = bracelet + shipping;
    const tax = subtotal * 0.0945;
    const total = subtotal + tax;

    document.getElementById('shipPrice').innerText = `$${shipping.toFixed(2)}`;
    document.getElementById('taxPrice').innerText = `$${tax.toFixed(2)}`;
    document.getElementById('totalPrice').innerText = `$${total.toFixed(2)}`;
  }

  function selectOption(el, name) {
    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('hiddenClover').value = name;
  }
  
  async function submitAndPay() {
    const style = document.getElementById('hiddenClover').value;
    if(!style) { alert("Please select a style!"); return; }

    const form = document.getElementById('orderForm');
    const formData = new FormData(form);
    
    try {
        const { error } = await supabase.from('pedidos').insert([{
            nombre: formData.get('Nombre'),
            estilo: style,
            total: document.getElementById('totalPrice').innerText
        }]);

        if (error) throw error;

        // Redirección a pago si todo salió bien
        window.open("https://cash.app/$Nemzzz0", "_blank");
    } catch (err) {
        console.error("Error al guardar:", err);
        alert("Hubo un error al procesar el pedido. Intenta de nuevo.");
    }
  }
</script>
