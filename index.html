<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloversLife INC</title>
  <style>
    body { background-color: #000000 !important; color: #ffffff !important; margin: 0; padding: 20px; font-family: sans-serif; }
    .jewelry-card { max-width: 400px; margin: 0 auto; }
    .brand-badge { font-weight: bold; font-size: 18px; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
    .main-product-img { width: 100%; border-radius: 8px; display: block; margin-bottom: 15px; opacity: 0.8; }
    .jewelry-details h4 { font-size: 22px; margin: 10px 0; font-weight: 700; }
    .collection-tag { font-size: 12px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }
    .price-tag { font-size: 24px; font-weight: bold; margin: 15px 0; color: #666; }
    .description { font-size: 14px; color: #ccc; line-height: 1.5; margin-bottom: 25px; }
    
    .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 20px; margin-bottom: 50px; margin-top: 30px; }
    
    /* Estilo para tarjetas agotadas */
    .option-card { 
        display: flex; flex-direction: column; align-items: center; border: 1px solid #333; 
        border-radius: 8px; padding: 10px; background: #111; cursor: not-allowed; 
        opacity: 0.6; transition: all 0.3s ease;
    }
    .option-card img { width: 50px; height: 50px; border-radius: 4px; filter: grayscale(1); }
    .option-card span { font-size: 11px; font-weight: 600; text-align: center; margin-bottom: 6px; margin-top: 25px; }
    .stock-label { font-size: 8px; font-weight: bold; padding: 2px 5px; background: #ff4444; color: #fff; border-radius: 3px; margin-top: 5px; text-transform: uppercase; }

    input, select { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; cursor: not-allowed; }
    .shipment-box { border: 1px solid #333; border-radius: 8px; padding: 15px; background: #111; margin-bottom: 20px; opacity: 0.5; }
    .shipment-option { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    .summary-box { border: 1px dashed #333; padding: 15px; margin-bottom: 20px; background: #050505; color: #fff; opacity: 0.5; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #aaa; }
    .total-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-top: 10px; }
    
    /* Botón deshabilitado */
    .sold-out-btn { 
        width: 100%; background: #222; color: #666; border: none; padding: 18px; 
        font-weight: bold; text-transform: uppercase; border-radius: 8px; 
        margin-top: 15px; cursor: not-allowed; text-align: center;
    }
  </style>
</head>
<body>

<div class="jewelry-card">
  <div class="brand-badge">CloversLife INC💎</div>
  <img src="https://i.ibb.co/zWPr8Q5b/IMG-7586.jpg" class="main-product-img">
  
  <div class="jewelry-details">
    <span class="collection-tag">Exclusive Drop</span>
    <h4>Iced Out Clover Bracelet</h4>
    <div class="description">Solid S925 CZ handset with clarity simulated diamonds. Maximum shine.</div>
    <div class="price-tag">$110.00</div>
  </div>

  <!-- Contenedor de opciones visuales -->
  <div class="options-grid">
    <div class="option-card"><img src="https://i.ibb.co/9ktPwHwY/IMG-7588.jpg"><span>Blue</span><div class="stock-label">Out of Stock</div></div>
    <div class="option-card"><img src="https://i.ibb.co/KcngDcLH/IMG-7593.jpg"><span>Green</span><div class="stock-label">Out of Stock</div></div>
    <div class="option-card"><img src="https://i.ibb.co/YsqQ6Bj/IMG-7592.jpg"><span>Pink</span><div class="stock-label">Out of Stock</div></div>
    <div class="option-card"><img src="https://i.ibb.co/5XsFkS0k/IMG-7594.jpg"><span>Mixed</span><div class="stock-label">Out of Stock</div></div>
    <div class="option-card"><img src="https://i.ibb.co/JWVGxrNv/IMG-7591.jpg"><span>Clear</span><div class="stock-label">Out of Stock</div></div>
  </div>

  <!-- Formulario bloqueado visualmente -->
  <div style="opacity: 0.5; pointer-events: none;">
      <select disabled><option>Size unavailable</option></select>
      <input type="text" placeholder="Full Name" disabled>
      <input type="email" placeholder="Email Address" disabled>
      <input type="text" placeholder="Shipping Address" disabled>
      <input type="text" placeholder="Apt / Suite (Optional)" disabled>
      <input type="text" placeholder="State" disabled>
      <input type="text" placeholder="Zip Code" disabled>
  </div>

  <div class="sold-out-btn">SOLD OUT</div>
</div>

</body>
</html>
